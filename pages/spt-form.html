<!-- SPT Form Page Fragment — dimuat via fetch() -->
<div class="w-full max-w-2xl fade-up mt-4 mx-auto">
    <button onclick="showPage('sppd')"
        class="inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-navy-600 mb-4 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 19l-7-7 7-7" />
        </svg>
        Kembali ke Menu SPPD
    </button>
    <div class="form-card bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

        <div class="bg-gradient-to-r from-gray-700 to-gray-600 px-6 py-5">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center">
                    <svg class="w-5 h-5 text-gray-200" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h3 class="text-white font-semibold">Pembuatan Surat Perintah (SPT)</h3>
                    <p class="text-gray-200/70 text-xs mt-0.5">Isi data surat perintah tugas dengan lengkap</p>
                </div>
            </div>
        </div>

        <form id="sptForm" onsubmit="submitSPT(event)" class="p-6 md:p-8 space-y-5">

            <!-- Nomor Surat -->
            <div>
                <label for="spt_nomor" class="block text-sm font-medium text-gray-700 mb-1.5">Nomor Surat <span
                        class="text-red-400">*</span></label>
                <input type="text" id="spt_nomor" name="spt_nomor" required
                    placeholder="cth. 653/RT.02.1-SPt/3673/1/2024"
                    class="field-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-sm outline-none" />
            </div>

            <!-- Menimbang -->
            <div>
                <label for="spt_menimbang"
                    class="block text-sm font-medium text-gray-700 mb-1.5 flex justify-between items-end">
                    <span>Menimbang <span class="text-red-400">*</span></span>
                    <span class="text-[10px] text-gray-400 font-normal uppercase tracking-wider">Bisa copy-paste
                        berbaris-baris</span>
                </label>
                <textarea id="spt_menimbang" name="spt_menimbang" required rows="4"
                    placeholder="a. Bahwa berdasarkan Petunjuk Teknis...&#10;b. Maka KPU Kota Serang mengundang..."
                    class="field-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-sm outline-none resize-none leading-relaxed"></textarea>
            </div>

            <!-- Dasar -->
            <div>
                <label for="spt_dasar"
                    class="block text-sm font-medium text-gray-700 mb-1.5 flex justify-between items-end">
                    <span>Dasar <span class="text-red-400">*</span></span>
                    <span class="text-[10px] text-gray-400 font-normal uppercase tracking-wider">Bisa copy-paste
                        berbaris-baris</span>
                </label>
                <textarea id="spt_dasar" name="spt_dasar" required rows="5"
                    placeholder="a. Undang-Undang Republik Indonesia Nomor...&#10;b. Peraturan Menteri Keuangan Nomor..."
                    class="field-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-sm outline-none resize-none leading-relaxed"></textarea>
            </div>

            <!-- Memerintahkan / Kepada -->
            <div>
                <label for="spt_kepada"
                    class="block text-sm font-medium text-gray-700 mb-1.5 flex justify-between items-end">
                    <span>Memerintahkan Kepada: <span class="text-red-400">*</span></span>
                    <span class="text-[10px] text-gray-400 font-normal uppercase tracking-wider">Paste semua nama &
                        jabatan</span>
                </label>
                <div
                    class="bg-blue-50 text-blue-800 text-xs px-3 py-2 rounded-lg border border-blue-100 font-medium mb-2">
                    Tips: Anda bisa langsung copy-paste tabel daftar nama dan jabatan seluruh pegawai dari Word/Excel ke
                    kotak ini.
                </div>
                <textarea id="spt_kepada" name="spt_kepada" required rows="7"
                    placeholder="1 Hendro Sulistyo - Sekretaris&#10;2 Andrie Minggon - Kasubag&#10;3 Tomi Irawan - Kasubag&#10;..."
                    class="field-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-sm outline-none resize-none leading-relaxed whitespace-pre"></textarea>
            </div>

            <!-- Untuk -->
            <div>
                <label for="spt_untuk"
                    class="block text-sm font-medium text-gray-700 mb-1.5 flex justify-between items-end">
                    <span>Untuk <span class="text-red-400">*</span></span>
                    <span class="text-[10px] text-gray-400 font-normal uppercase tracking-wider">Bisa copy-paste
                        berbaris-baris</span>
                </label>
                <textarea id="spt_untuk" name="spt_untuk" required rows="5"
                    placeholder="1 Menghadiri Kegiatan...&#10;2 Hari ... Tanggal ... Di...&#10;3 Membawa peralatan...&#10;4 Membuat laporan..."
                    class="field-input w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 text-sm outline-none resize-none leading-relaxed"></textarea>
            </div>

            <div class="border-t border-gray-100 pt-2"></div>

            <button type="submit" id="btnSubmitSpt"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-gray-700 to-gray-600 text-white text-sm font-semibold shadow-lg shadow-gray-500/20 hover:shadow-gray-500/30 hover:brightness-110 active:scale-[.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:brightness-100">
                <svg id="btnIconSpt" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">

                </svg>
                <span id="btnTextBkpt">Kirim Bukti Konfirmasi</span>
            </button>
        </form>
    </div>
</div>
